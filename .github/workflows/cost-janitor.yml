name: Cost Janitor

on:
  pull_request:
  push:

jobs:
  janitor:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          cd janitor
          pip install -r requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve

      - name: Run Cost Janitor
        run: |
          cd janitor
          python janitor.py --dry-run

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: report-json
          path: janitor/report.json

      - name: Upload Markdown Summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-md
          path: janitor/summary.md
